<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miki's Cosmetics</title>
    <!-- Importing Google Fonts for a clean, modern cosmetic brand look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffeff3; /* Light soft pink background */
            font-family: 'Poppins', sans-serif;
            color: #2b2b2b;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Hero Banner Container */
        .hero-banner {
            display: grid;
            grid-template-columns: 1fr 1fr;
            align-items: center;
            background-color: #4a5d54; /* Sophisticated muted green-grey tone from the reference style */
            max-width: 1100px;
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }

        /* Left Side: Text and CTA */
        .hero-content {
            padding: 60px 40px;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .hero-content h1 {
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: 1px;
            line-height: 1.2;
            text-transform: uppercase;
        }

        .hero-content p {
            font-size: 1rem;
            font-weight: 300;
            line-height: 1.5;
            color: #e0e0e0;
        }

        /* Shop Button */
        .shop-btn {
            display: inline-block;
            background-color: #ffffff;
            color: #2b2b2b;
            padding: 12px 28px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            width: fit-content;
            transition: background-color 0.3s ease, transform 0.2s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        }

        .shop-btn:hover {
            background-color: #ffeff3;
            transform: translateY(-2px);
        }

        /* Right Side: Product Image Display */
        .hero-image-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .hero-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            min-height: 450px;
        }

        /* Responsive Design for Mobile Devices */
        @media (max-width: 768px) {
            .hero-banner {
                grid-template-columns: 1fr;
            }

            .hero-content {
                padding: 40px 20px;
                text-align: center;
                align-items: center;
            }

            .hero-content h1 {
                font-size: 2rem;
            }

            .hero-image-container img {
                max-height: 350px;
                min-height: auto;
            }
        }
    </style>
</head>
<body>

    <div class="hero-banner">
        <!-- Left Side: Branding and Briefing -->
        <div class="hero-content">
            <h1>Miki's Cosmetics Kojic Acid Sakura</h1>
            <p>
                Discover the ultimate radiance routine. Formulated with nourishing Kojic Acid and delicate Sakura extracts, our collection works harmoniously to repair your skin barrier, deeply hydrate, and unveil a luminous, natural glow.
            </p>
            <a href="#shop" class="shop-btn">Shop Kojic Sakura</a>
        </div>

        <!-- Right Side: Skincare Products Showcase Photo -->
        <div class="hero-image-container">
            <!-- Showcasing the skincare products nicely lined up with the body scrub open and sideways -->
            <img src="https://images.unsplash.com/photo-1608248597359-99e6b7720993?auto=format&fit=crop&w=800&q=80" alt="Miki's Cosmetics Kojic Acid Sakura Skincare Line">
        </div>
    </div>

</body>
</html>
